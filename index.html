<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="alternate icon" href="./src/assets/zaptalklogo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icon-maskable.svg" />

    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Viewport: keep scaling flexible -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- Mobile app-like behavior -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#FF5722" />
    <meta name="apple-mobile-web-app-title" content="Ember" />
    <meta name="application-name" content="Ember" />

    <!-- SEO -->
    <meta
      name="description"
      content="ZapTalk - Connect and chat with people instantly"
    />
    <meta name="keywords" content="chat, messaging, communication, zaptalk" />
    <meta name="author" content="ZapTalk" />

    <title>Ember</title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color:  #06040C;
        background-repeat: no-repeat;
        background-size: cover;
        color: #fff;
        -webkit-tap-highlight-color: transparent; /* remove gray tap highlight */
      }

      /* Respect safe areas */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      #root {
        height: 100vh;
        height: 100dvh; /* dynamic viewport for modern browsers */
        width: 100vw;
        position: relative;
      }

      /* Inputs should stay selectable & editable */
      input,
      textarea,
      select {
        font-size: 16px; /* prevents iOS zoom */
      }

      button,
      .cursor-pointer {
        touch-action: manipulation;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>


  </body>
</html>
