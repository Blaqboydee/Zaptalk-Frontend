  <g transform="translate(154, 80) scale(6.4)">
    <path
      d="M16 2
         C16 2 22 8 22 14
         C22 17 20.5 19.5 19 21
         C20 18 19.5 15.5 18 14
         C18 17 16.5 19 15 20
         C15.5 17.5 14.5 15.5 13 14.5
         C11 17 10 20 10 23
         C10 27.4 12.7 30 16 30
         C19.3 30 22 27.4 22 23
         C22 20 20.5 17.5 19 16
         C20.5 19 21 21 21 23
         C21 26.9 18.8 29 16 29
         C13.2 29 11 26.9 11 23
         C11 20.5 12.5 18.5 14 17
         C14 19.5 15 21 16 22
         C17.5 20.5 18 18.5 18 16
         C18 13 16 10 16 2Z"
      fill="url(#m-flame)"
    />
    <path
      d="M16 18 C16 18 18.5 20.5 18.5 23 C18.5 25.2 17.4 26.5 16 26.5 C14.6 26.5 13.5 25.2 13.5 23 C13.5 20.5 16 18 16 18Z"
      fill="url(#m-core)"
      opacity="0.9"
    />
  </g>

  <defs>
